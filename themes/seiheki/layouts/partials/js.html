<script type="text/x-mathjax-config;executed=true">
    window.MathJax.Hub.Config({
        showProcessingMessages: false, //关闭js加载过程信息
        messageStyle: "none", //不显示信息
        jax: ["input/TeX", "output/HTML-CSS"],
        tex2jax: {
            inlineMath: [["$", "$"], ["\\(", "\\)"]], //行内公式选择符
            displayMath: [["$$", "$$"], ["\\[", "\\]"]], //段内公式选择符
            skipTags: ["script", "noscript", "style", "textarea", "pre", "code", "a"] //避开某些标签
        },
        "HTML-CSS": {
            availableFonts: ["STIX", "TeX"], //可选字体
            showMathMenu: false //关闭右击菜单显示
        }
    });
    //下面第三个参数可以不写，默认对整个html内的latex进行翻译
    window.MathJax.Hub.Queue(["Typeset", MathJax.Hub,document.getElementsByClassName("ck-content")]);

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        if (prefersReducedMotion.matches) {
            return;
        }

        window.addEventListener('pageshow', function() {
            document.body.classList.remove('is-page-leaving');
        });

        document.addEventListener('click', function(event) {
            const link = event.target.closest('a');

            if (!link || event.defaultPrevented) return;
            if (event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
            if (link.target && link.target !== '_self') return;
            if (link.hasAttribute('download') || link.dataset.noTransition !== undefined) return;

            const href = link.getAttribute('href');
            if (!href || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('javascript:')) return;

            const targetUrl = new URL(link.href, window.location.href);
            const currentUrl = new URL(window.location.href);
            const isHashOnlyNavigation = targetUrl.pathname === currentUrl.pathname
                && targetUrl.search === currentUrl.search
                && targetUrl.hash !== currentUrl.hash;

            if (targetUrl.origin !== currentUrl.origin || isHashOnlyNavigation) return;
            if (targetUrl.href === currentUrl.href) return;

            event.preventDefault();
            document.body.classList.add('is-page-leaving');

            window.setTimeout(function() {
                window.location.href = targetUrl.href;
            }, 220);
        });
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        function extractCodeContent(container) {
            const tableCode = container.querySelector(
                '.lntd:last-child pre > code, .lntd:last-child code, table tr td:last-child pre > code, table tr td:last-child code'
            );

            if (tableCode) {
                return tableCode.innerText.trim();
            }

            const codeCandidates = Array.from(container.querySelectorAll('pre > code, code'));

            if (codeCandidates.length === 0) {
                return container.innerText.trim();
            }

            const preferredCode = [...codeCandidates].reverse().find(function(node) {
                return node.dataset.lang || node.className.indexOf('language-') !== -1;
            }) || codeCandidates[codeCandidates.length - 1];

            const clone = preferredCode.cloneNode(true);

            // Hugo 的内联行号通常没有类名，只能按不可选中的样式节点移除。
            const lineNumbers = clone.querySelectorAll(
                '.ln, .lnt, .ln-no, [style*="user-select:none"], [style*="-webkit-user-select:none"]'
            );
            lineNumbers.forEach(function(lineNumber) {
                lineNumber.remove();
            });

            return clone.innerText.trim();
        }

        // 获取所有代码块容器
        const codeBlocks = document.querySelectorAll('.highlight, pre:not(.highlight pre)');
        
        codeBlocks.forEach(function(container) {
            if (container.closest('.code-wrapper')) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            container.parentNode.insertBefore(wrapper, container);
            wrapper.appendChild(container);

            const copyButton = document.createElement('button');
            copyButton.className = 'copy-code-button';
            copyButton.innerHTML = '<span class="material-symbols-outlined">content_copy</span>';
            wrapper.appendChild(copyButton);

            copyButton.addEventListener('click', function() {
                let codeContent = extractCodeContent(container);

                // 最终清理：移除按钮自身文字并去除首尾空白
                codeContent = codeContent.replace('content_copy', '').replace('Copied!', '').trim();

                navigator.clipboard.writeText(codeContent).then(function() {
                    const originalIcon = copyButton.innerHTML;
                    copyButton.innerText = 'Copied!';
                    copyButton.classList.add('copied');
                    setTimeout(function() {
                        copyButton.innerHTML = originalIcon;
                        copyButton.classList.remove('copied');
                    }, 2000);
                }, function(err) {
                    console.error('Failed to copy: ', err);
                });
            });
        });
    });
</script>
